<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 打字速度測試器 - 挑戰排行版</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --success: #4ade80;
            --error: #f87171;
            --error-bg: rgba(248, 113, 113, 0.15);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 850px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
        }

        .passage-box {
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.7;
            letter-spacing: 2px;
            background: rgba(15, 23, 42, 0.6);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            min-height: 80px;
            user-select: none;
            word-break: break-all;
        }

        .passage-box span { color: var(--text-muted); }
        .correct { color: var(--success) !important; text-shadow: 0 0 8px rgba(74, 222, 128, 0.4); }
        .incorrect { color: var(--error) !important; background-color: var(--error-bg); border-radius: 4px; }
        
        textarea {
            width: 100%; height: 110px; font-size: 18px; padding: 15px; box-sizing: border-box;
            background-color: rgba(15, 23, 42, 0.8); border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: var(--text-main); resize: none; transition: all 0.3s ease;
        }
        textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(56, 189, 248, 0.25); }
        textarea:disabled { background-color: rgba(15, 23, 42, 0.3); color: rgba(255, 255, 255, 0.2); cursor: not-allowed; }
        
        .dashboard { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; flex-wrap: wrap; gap: 15px; }
        .stats-group { display: flex; gap: 20px; }
        .stat-box { background: rgba(15, 23, 42, 0.5); padding: 10px 20px; border-radius: 10px; font-size: 14px; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; min-width: 80px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .stat-box span { color: var(--primary); font-size: 28px; font-weight: 700; margin-top: 4px; }
        
        .control-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .name-input {
            background-color: rgba(15, 23, 42, 0.8);
            color: var(--text-main);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            font-size: 16px;
            border-radius: 10px;
            outline: none;
            width: 140px;
        }
        .name-input:focus { border-color: var(--primary); }

        select {
            background-color: rgba(15, 23, 42, 0.8);
            color: var(--text-main);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: var(--primary); }

        button { background-color: var(--primary); color: #0f172a; border: none; padding: 14px 25px; font-size: 16px; font-weight: 700; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2); }
        button:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { background-color: #475569; color: #1e293b; cursor: not-allowed; transform: none; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 15px; }
        th, td { padding: 14px 16px; text-align: left; }
        th { background-color: rgba(15, 23, 42, 0.4); color: var(--text-muted); font-weight: 600; border-bottom: 2px solid rgba(255, 255, 255, 0.05); }
        td { border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #e2e8f0; }
        
        .rank-1 { color: #f59e0b; font-weight: bold; }
        .rank-2 { color: #cbd5e1; font-weight: bold; }
        .rank-3 { color: #b45309; font-weight: bold; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
        .badge-EASY { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .badge-MEDIUM { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .badge-HARD { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>

    <h1>⌨️ Web 打字速度測試器</h1>

    <div class="card">
        <div id="passage-box" class="passage-box">輸入名稱、選擇難易度並點擊「開始測試」...</div>
        <textarea id="type-input" placeholder="等待測試開始..." disabled></textarea>
        
        <div class="dashboard">
            <div class="stats-group">
                <div class="stat-box">倒數計時<span id="timer">60</span></div>
                <div class="stat-box">WPM<span id="wpm">0</span></div>
                <div class="stat-box">正確率<span id="accuracy">100%</span></div>
            </div>
            <div class="control-group">
                <input type="text" id="username-input" class="name-input" placeholder="玩家名稱" maxlength="10" value="Gamer">
                
                <select id="difficulty-select">
                    <option value="easy">🟢 簡單模式 (Easy)</option>
                    <option value="medium">🟡 中等難度 (Medium)</option>
                    <option value="hard">🔴 程式碼挑戰 (Hard)</option>
                </select>
                <button id="start-btn">開始測試</button>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>🏆 殿堂級英雄榜 (Top 10)</h3>
        <table>
            <thead>
                <tr>
                    <th>名次</th>
                    <th>玩家名稱</th>
                    <th>WPM (每分鐘字數)</th>
                    <th>正確率</th>
                    <th>挑戰模式</th>
                    <th>測試時間</th>
                </tr>
            </thead>
            <tbody id="leaderboard-tbody">
                <tr><td colspan="6" style="text-align:center; color: var(--text-muted);">暫無紀錄，等你來霸榜！</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const passageBox = document.getElementById('passage-box');
        const typeInput = document.getElementById('type-input');
        const timerDisplay = document.getElementById('timer');
        const wpmDisplay = document.getElementById('wpm');
        const accuracyDisplay = document.getElementById('accuracy');
        const startBtn = document.getElementById('start-btn');
        const difficultySelect = document.getElementById('difficulty-select');
        const usernameInput = document.getElementById('username-input');
        const leaderboardTbody = document.getElementById('leaderboard-tbody');

        let timeLeft = 60;
        let timerInterval = null;
        let startTime = null;
        let isPlaying = false;
        let globalCorrectChars = 0;

        // 初始化載入排行榜
        loadLeaderboard();

        startBtn.addEventListener('click', async () => {
            const selectedDiff = difficultySelect.value;
            const response = await fetch(`/api/get-passage?difficulty=${selectedDiff}`);
            const data = await response.json();
            
            passageBox.innerHTML = '';
            data.content.split('').forEach(char => {
                const span = document.createElement('span');
                span.innerText = char;
                passageBox.appendChild(span);
            });

            typeInput.value = '';
            typeInput.disabled = false;
            typeInput.focus();
            timeLeft = 60;
            timerDisplay.innerText = timeLeft;
            wpmDisplay.innerText = '0';
            accuracyDisplay.innerText = '100%';
            startBtn.disabled = true;
            difficultySelect.disabled = true;
            usernameInput.disabled = true;
            isPlaying = true;
            globalCorrectChars = 0;
            startTime = new Date();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        });

        typeInput.addEventListener('input', () => {
            if (!isPlaying) return;

            const arraySpans = passageBox.querySelectorAll('span');
            const arrayValues = typeInput.value.split('');
            let correctChars = 0;

            arraySpans.forEach((charSpan, index) => {
                const inputChar = arrayValues[index];
                if (inputChar == null) {
                    charSpan.classList.remove('correct', 'incorrect');
                } else if (inputChar === charSpan.innerText) {
                    charSpan.classList.add('correct');
                    charSpan.classList.remove('incorrect');
                    correctChars++;
                } else {
                    charSpan.classList.add('incorrect');
                    charSpan.classList.remove('correct');
                }
            });

            globalCorrectChars = correctChars;

            const timeElapsed = (new Date() - startTime) / 1000 / 60;
            if (timeElapsed > 0 && arrayValues.length > 0) {
                const wpm = Math.round((arrayValues.length / 5) / timeElapsed);
                wpmDisplay.innerText = wpm;

                // 即時打字時，顯示目前已打字數的正確率，體驗較流暢
                const currentAccuracy = Math.round((correctChars / arrayValues.length) * 100);
                accuracyDisplay.innerText = currentAccuracy + '%';
            }

            if (arrayValues.length >= arraySpans.length) {
                endGame();
            }
        });

        async function endGame() {
            clearInterval(timerInterval);
            isPlaying = false;
            typeInput.disabled = true;
            startBtn.disabled = false;
            difficultySelect.disabled = false;
            usernameInput.disabled = false;

            const finalWpm = parseInt(wpmDisplay.innerText);
            const arraySpans = passageBox.querySelectorAll('span');
            const arrayValues = typeInput.value.split('');
            
            // 檢查玩家有沒有打完最後一個字
            const isCompleted = arrayValues.length >= arraySpans.length;

            // 結算正確率：把未完成的字全部當作錯誤
            let finalAccuracy = 0;
            if (arraySpans.length > 0) {
                finalAccuracy = Math.round((globalCorrectChars / arraySpans.length) * 100);
            }
            accuracyDisplay.innerText = finalAccuracy + '%';

            const currentDiff = difficultySelect.value;
            const currentUsername = usernameInput.value.trim() || '匿名玩家';

            // 將結果、名字及「是否完成」狀態送至後端
            const response = await fetch('/api/save-result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    wpm: finalWpm, 
                    accuracy: finalAccuracy, 
                    difficulty: currentDiff,
                    username: currentUsername,
                    is_completed: isCompleted
                })
            });

            const resultData = await response.json();

            // 依據後端判定彈出不同對話框
            if (resultData.status === 'ignored') {
                alert(`⚠️ 測試結束！\n您的速度: ${finalWpm} WPM\n因未完成整篇文章，成績將【不會】列入排行榜中！`);
            } else {
                alert(`🎉 恭喜完成挑戰！\n玩家: ${currentUsername}\n速度: ${finalWpm} WPM\n最終正確率: ${finalAccuracy}%`);
            }

            loadLeaderboard();
        }

        async function loadLeaderboard() {
            const response = await fetch('/api/get-leaderboard');
            const data = await response.json();
            
            const historyTbody = document.getElementById('leaderboard-tbody');
            if(data.length === 0) {
                historyTbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-muted);">暫無紀錄，等你來霸榜！</td></tr>';
                return;
            }

            historyTbody.innerHTML = '';
            data.forEach((item, index) => {
                const rank = index + 1;
                let rankClass = '';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="${rankClass}">${rank === 1 ? '🥇 1' : rank === 2 ? '🥈 2' : rank === 3 ? '🥉 3' : rank}</td>
                    <td style="color: #e2e8f0; font-weight: 500;">${item.username}</td>
                    <td style="font-weight: 600; color: var(--primary);">${item.wpm}</td>
                    <td style="color: var(--success);">${item.accuracy}%</td>
                    <td><span class="badge badge-${item.difficulty}">${item.difficulty}</span></td>
                    <td style="color: var(--text-muted); font-size: 13px;">${item.date}</td>
                `;
                historyTbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
